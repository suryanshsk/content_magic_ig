name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    name: Validate Python Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate imports and syntax
        run: python -m compileall -q .

      - name: Smoke import core modules
        run: |
          python - <<'PY'
          import main
          import config
          import scrapers.instagram_client
          import processors.metrics
          import intelligence.idea_generator
          import reports.weekly_report
          print("Smoke imports successful")
          PY
